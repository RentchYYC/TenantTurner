name: Generate Rentch XML Feed

on:
  schedule:
    # Runs every day at 6:00 AM Mountain Time (12:00 UTC)
    - cron: "0 12 * * *"
  workflow_dispatch:  # also allows manual trigger from GitHub UI

jobs:
  generate-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run feed generator
        run: python generate_feed.py

      - name: Commit updated XML if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rentch_tenant_turner_full_feed.xml
          git diff --cached --quiet || git commit -m "Auto-update XML feed [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
